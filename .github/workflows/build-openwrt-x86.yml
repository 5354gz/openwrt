name: Build OpenWrt x86

on:
  push:
    branches: [ main ]  # 触发编译的分支
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # 拉取仓库代码

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 python3-distutils

    - name: Set up .config
      run: |
        # 如果 .config 文件已经存在，直接使用
        if [ -f .config ]; then
          echo ".config file found, using existing configuration."
        else
          # 如果没有 .config 文件，生成默认配置
          echo "Generating default .config..."
          make defconfig
          # 添加自定义配置
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_generic=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_EXT4FS=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=300" >> .config
          echo "CONFIG_GRUB_IMAGES=y" >> .config
          echo "CONFIG_GRUB_EFI_IMAGES=y" >> .config
          echo "CONFIG_GRUB_BOOTOPTS=\"rootfstype=ext4 rootwait\"" >> .config
        fi

    - name: Download feeds and packages
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Compile OpenWrt
      run: |
        make defconfig
        make download -j$(nproc)
        make -j$(nproc) || make -j1 V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: openwrt-x86-firmware
        path: bin/targets/x86/64/
